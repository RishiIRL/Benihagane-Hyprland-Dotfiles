general {
    ignore_empty_input = false
    hide_cursor = true
}

#Wallpaper
background {
    monitor = eDP-1
    path = ~/.config/hypr/Wallpaper.jpg
    color = rgb(214, 20, 6)
    blur_passes = 2
    blur_size = 3
}

#lockicon
image {
    window = eDP-1
    path = ~/.config/hypr/lock-icon.png
    border_size = 0
    size = 40
    position = 0, 315
}
#loginbox
shape { 
    monitor = eDP-1
    size = 350, 250
    color = rgba(0,0,0,0.6)
    rounding = 15

    position = -125, -158
    zindex = 0
}
#login header
label {
    monitor = eDP-1
    text = LOG IN
    font_size = 48
    font_family = CF Samurai Bob
    color = rgba(254, 254, 254, 0.6)

    position = -205, -73
    zindex = 1
}

#fake textebox for username
shape {
    monitor = eDP-1
    size = 300, 60
    color = rgba(0,0,0,0.7)

    rounding = 12
    position = -125, -158
    zindex = 1
}

